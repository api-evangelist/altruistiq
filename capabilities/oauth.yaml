naftiko: 1.0.0-alpha2
info:
  label: Altruistiq Datasource API — OAuth Token
  description: Exchange OAuth 2.0 Client Credentials for an Altruistiq access token.
  tags:
    - Altruistiq
    - OAuth
    - Authentication
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      ALTRUISTIQ_CLIENT_ID: ALTRUISTIQ_CLIENT_ID
      ALTRUISTIQ_CLIENT_SECRET: ALTRUISTIQ_CLIENT_SECRET
capability:
  consumes:
    - type: http
      namespace: oauth
      baseUri: https://app.altruistiq.com/api/public/v1
      resources:
        - name: oauth-token
          path: /oauth2/token
          operations:
            - name: getAccessToken
              method: POST
              description: Retrieve An Access Token
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: oauth-rest
      port: 8080
      resources:
        - path: /v1/oauth2/token
          name: oauth-token
          operations:
            - method: POST
              name: getAccessToken
              call: oauth.getAccessToken
              with: { body: rest.body }
    - type: mcp
      namespace: oauth-mcp
      port: 9090
      transport: http
      tools:
        - name: altruistiq-get-access-token
          description: Retrieve An Access Token
          hints: { readOnly: false, destructive: false, idempotent: false }
          call: oauth.getAccessToken
          with: { body: tools.body }
