components:
  securitySchemes:
    bearerAuth:
      type: apiKey
      name: Authorization
      in: header
      description: 'Enter the token with the `Bearer: ` prefix, e.g. `Bearer: apiKey`.'
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://app.altruistiq.com/api/public/v1/oauth2/token
  schemas:
    '401':
      type: object
      properties:
        status:
          type: string
          example: Unauthorized
          description: Request was unauthorized
    '404':
      type: object
      properties:
        status:
          type: string
          example: Not found
          description: Resource not found
    '500':
      type: object
      properties:
        status:
          type: string
          example: Server Error
          description: Internal Error
    '504':
      type: object
      properties:
        status:
          type: string
          example: Not Implemented
          description: Not Implemented
    OauthToken:
      required:
      - client_id
      - client_secret
      - grant_type
      type: object
      properties:
        client_id:
          type: string
          example: client-id-123
          description: The client ID.
        client_secret:
          type: string
          example: client_secret-123
          description: The client secret.
        grant_type:
          type: string
          enum:
          - client_credentials
          example: client_credentials
    DataSourceResponse:
      allOf:
      - type: object
        properties:
          datasourceId:
            type: string
            example: '123'
      - $ref: '#/components/schemas/DataSource'
    DataSourcesResponse:
      type: array
      items:
        allOf:
        - type: object
          properties:
            datasourceId:
              type: string
              example: '123'
        - $ref: '#/components/schemas/DataSource'
    ExportStatus:
      type: string
      enum:
      - QUEUED
      - RUNNING
      - SUCCEEDED
      - FAILED
      - CANCELLED
      example: QUEUED
    DataSource:
      required:
      - userEmail
      - name
      type: object
      properties:
        startDate:
          type: string
          format: date-time
          description: Start date can be inferred from the data. ISO 8601, UTC
        updateFrequency:
          type: string
          enum:
          - yearly
          - quarterly
          - monthly
          - fortnightly
          - weekly
        endDate:
          type: string
          format: date-time
          description: End date does not have to be set if the datasource is going to be updated frequently, ISO 8601, UTC
        userEmail:
          type: string
          example: hello@email.com
          description: The user who will be owning the data source and will receive notifications
        name:
          type: string
          example: My Datasource Name
          description: 'Name of the datasource. A good practice is to write it like this:


            {Source system} {Short description}'
        methods:
          type: array
          items:
            type: string
          description: "Methods are important to assign the right emission factor and align with GHG accounting standards.\
            \ If you\u2019re not sure about the method, leave it blank or ask a sustainability expert."
        activities:
          type: array
          description: "Activities are Altruistiq\u2019s way of categorising emissions. One datasource may be related to a\
            \ multitude of activities. It is best to define activities ahead of creating a datasource with a solution advisor.\n\
            \nActivities can be left blank and edited in-app."
          items:
            type: string
            enum:
            - ElectricityPurchased
            - ElectricityFuel
            - ElectricityRenewable
            - HeatingOnsite
            - HeatingDistrict
            - WaterUse
            - StationaryCombustion
            - SolidWaste
            - Wastewater
            - FugitiveEmissions
            - DirectEmissions
            - LogisticsOwn
            - Logistics3rd
            - LogisticsInboundProductFootprint
            - BusinessTravelOwn
            - BusinessTravel3rd
            - CommutingLocation
            - CommutingSurvey
            - ProductInputs
            - CapitalGoods
            - IndirectPurchases
            - Processing
            - UseOfSold
            - PostConsumerWaste
            - UseOfLeased
            - Investments
            - Franchises
    CreateProductResponse:
      properties:
        id:
          format: uuid
          type: string
          description: The UUID of the product record
          example: aee349fd-28e4-450d-9e20-af64d9c0d813
      type: object
      required:
      - id
    CreateProductRequest:
      properties:
        productKey:
          type: string
          description: Your product code or identifier.
          example: CAN-1234A
        name:
          type: string
          description: The name of the product
          example: Canned food - Single
        description:
          type: string
          description: The description of the product.
          example: Our best ever canned food product
        category:
          type: string
          description: The category the product falls into.
          example: Food
        declaredUnit:
          type: string
          description: ' A single declared unit of the product.'
          example: 1 can
        weightPerDeclaredUnit:
          exclusiveMinimum: true
