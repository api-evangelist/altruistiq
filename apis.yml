apis:
  - aid: altruistiq:altruistiq-datasource-api
    name: Altruistiq Datasource API
    description: >-
      Upload, manage, and export activity and product data used to calculate enterprise emissions on the Altruistiq
      platform. Covers multipart file uploads into named Datasources, corporate emissions Exports with filtering and
      download URLs, full CRUD on Products, Product Structures (bills of materials), and Product Structure Inputs
      (material and packaging line items), Facility version management, geographic Location reference data (countries
      and subdivisions), and Organization and business unit lookups. Authenticated via OAuth 2.0 Client Credentials
      against /api/public/v1/oauth2/token. Production server is https://app.altruistiq.com/api/public/v1.
    humanURL: https://docs.altruistiq.com
    baseURL: https://app.altruistiq.com/api/public/v1
    tags:
      - Sustainability
      - Carbon Accounting
      - Emissions
      - Datasource
      - Products
      - Facilities
      - Export
