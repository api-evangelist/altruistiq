  - aid: altruistiq:altruistiq-pact-api
    name: Altruistiq PACT API
    description: >-
      PACT-conformant Product Carbon Footprint data exchange surface for sharing ingredient-level PCF data with
      customers and partners per the WBCSD Partnership for Carbon Transparency (PACT) Pathfinder Framework. Exposed
      through the same /api/public/v1 surface alongside the Datasource API. Used to fulfil B2B customer RFPs and
      downstream Scope 3 reporting requests with traceable, methodology-aware PCFs.
    humanURL: https://docs.altruistiq.com
    baseURL: https://app.altruistiq.com/api/public/v1
