description: >-
  FOCUS-aligned FinOps definition for the Altruistiq enterprise SaaS platform.
  Altruistiq is sold as a contracted annual subscription with usage scaled by
  organization scope (entities, products, suppliers) rather than per-API-call
  metering. This file documents the chargeable surface and FOCUS column
  mapping at the contract level; specific unit rates are negotiated per
  customer and are not published.
